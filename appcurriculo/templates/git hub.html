<!DOCTYPE html>
<html lang="pt br">
<head>
    <meta charset="UTF-8">
    <title>meu github</title>
    <style>

    body {
        background-color: #0d1117;
        color: #c9d1d9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    div {
        width: 100%;
        max-width: 500px;
        padding: 20px;
    }

    fieldset {
        border: 1px solid #30363d;
        border-radius: 10px;
        background-color: #161b22;
        padding: 30px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    h3 {
        color: #f0f6fc;
        font-size: 28px;
        margin-top: 0;
        border-bottom: 1px solid #30363d;
        padding-bottom: 10px;
    }

    h4 {
        color: #8b949e;
        margin-bottom: 15px;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-bottom: 30px;
    }

    li {
        background: #0d1117;
        margin-bottom: 8px;
        padding: 10px 15px;
        border-radius: 6px;
        border: 1px solid #30363d;
        font-size: 14px;
        transition: 0.3s;
    }

    li:hover {
        border-color: #238636; /* Verde GitHub */
        color: #f0f6fc;
    }


    button {
        width: 100%;
        background-color: #238636;
        color: #ffffff;
        border: 1px solid rgba(240, 246, 252, 0.1);
        padding: 12px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    button:hover {
        background-color: #2ea043;
    }

    a {
        text-decoration: none;
    }
</style>
</head>
<body>
<style>
body {

    background-color: #0d1117;


    background-image: radial-gradient(circle at center, #1a2333 0%, #0d1117 70%);

    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
}


fieldset {

    background-color: rgba(22, 27, 34, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(48, 54, 61, 0.5);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}
</style>
<div>
    <fieldset>
        <h3>
           Felipe Canazza.
        </h3>

        <h4>
            temas presentes no meu git hub!
        </h4>
        <ul>
            <li>projetos em django</li>
            <li>projetos em sql /banco de dados</li>
            <li>
                projeto de poo/sistemas de classes
            </li>
            <li>conhecimento médio de html e css</li>
        </ul>
        <a href="https://github.com/felipecanazza3-dev">
            <button>
               Ver gitbub
            </button>
        </a>

    </fieldset>
</div>

</body>
</html>
